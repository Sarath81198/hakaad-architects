<section id="heroCarousel" class="carousel slide">
  <div class="carousel-indicators">
    <button
      type="button"
      data-bs-target="#heroCarousel"
      data-bs-slide-to="0"
      class="active"
      aria-current="true"
    ></button>
    <button
      type="button"
      data-bs-target="#heroCarousel"
      data-bs-slide-to="1"
    ></button>
    <button
      type="button"
      data-bs-target="#heroCarousel"
      data-bs-slide-to="2"
    ></button>
  </div>

  <div class="carousel-inner">
    <div class="carousel-item active">
      <img
        src="/hakaad-architects/assets/images/carousel/slide1.jpg"
        class="d-block w-100"
      />
    </div>
    <div class="carousel-item">
      <img
        src="/hakaad-architects/assets/images/carousel/slide2.jpg"
        class="d-block w-100"
      />
    </div>
    <div class="carousel-item">
      <img
        src="/hakaad-architects/assets/images/carousel/slide3.jpg"
        class="d-block w-100"
      />
    </div>
  </div>

  <!-- Prev / Next arrows -->
  <button
    class="carousel-control-prev"
    type="button"
    data-bs-target="#heroCarousel"
    data-bs-slide="prev"
  >
    <span class="carousel-control-prev-icon" aria-hidden="true"></span>
  </button>
  <button
    class="carousel-control-next"
    type="button"
    data-bs-target="#heroCarousel"
    data-bs-slide="next"
  >
    <span class="carousel-control-next-icon" aria-hidden="true"></span>
  </button>
</section>

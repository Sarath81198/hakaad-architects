<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Haakad Architects</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@400;500;600&family=Prompt:wght@300;400;500&display=swap"
      rel="stylesheet"
    />

    <!-- Bootstrap CSS CDN -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <!-- Bootstrap Icons -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css"
    />

    <!-- Custom CSS -->
    <link rel="stylesheet" href="assets/css/style.css" />
    <link rel="stylesheet" href="assets/css/navbar.css" />
    <link rel="stylesheet" href="assets/css/carousel.css" />
    <link rel="stylesheet" href="assets/css/responsive.css" />
    <link rel="stylesheet" href="assets/css/parallax.css" />
    <link rel="stylesheet" href="assets/css/clients.css" />
    <link rel="stylesheet" href="assets/css/footer.css" />
  </head>

  <body>
    <!-- Preloader -->
    <div id="preloader">
      <img
        src="/hakaad-architects/assets/images/logo.png"
        alt="Haakad Architects"
      />
    </div>

    <!-- Navbar -->
    <header id="navbar"></header>

    <main>
      <div id="hero-carousel"></div>

      <!-- Parallax 1 - between carousel and clients -->
      <div class="parallax parallax-2">
        <div class="parallax-content">
          <h2>Designing Spaces That Inspire</h2>
          <p>Architecture with purpose and passion</p>
        </div>
      </div>

      <!-- Clients -->
      <section id="clients-section"></section>

      <!-- Parallax 2 - between clients and testimonials -->
      <div class="parallax parallax-2">Testing</div>

      <!-- Parallax 3 - at bottom -->
      <div class="parallax parallax-3">
        <div class="parallax-content">
          <h2>Let's Build Something Great</h2>
          <p>Get in touch with our team today</p>
        </div>
      </div>
    </main>

    <div id="footer"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/main.js"></script>
    <script src="assets/js/parallax.js"></script>
  </body>
</html>

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact - Haakad Architects</title>

    <!-- Bootstrap -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <!-- Icons -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css"
    />

    <link
      href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@400;500;600;700&family=Prompt:wght@300;400;500&display=swap"
      rel="stylesheet"
    />

    <!-- CSS -->
    <link rel="stylesheet" href="assets/css/style.css" />
    <link rel="stylesheet" href="assets/css/contact.css" />
    <link rel="stylesheet" href="assets/css/navbar.css" />
    <link rel="stylesheet" href="assets/css/parallax.css" />
    <link rel="stylesheet" href="assets/css/footer.css" />
    <link rel="stylesheet" href="assets/css/work.css" />
  </head>

  <body>
    <header id="navbar"></header>

    <main>
      <!-- HERO -->
      <div class="parallax parallax-contact">
        <div class="parallax-content">
          <h2>Get in touch with Us!</h2>
        </div>
      </div>

      <!-- CONTACT -->
      <section class="contact-clean">
        <div class="container">
          <!-- Social -->
          <div class="social-bar text-center mb-5">
            <span>Connect with us</span>
            <div class="portfolio-social mt-2">
              <a
                href="https://www.facebook.com/haakadarchitects.inc?mibextid=LQQJ4d"
                target="_blank"
              >
                <i class="bi bi-facebook"></i>
              </a>

              <a
                href="https://www.instagram.com/haakad_architects"
                target="_blank"
              >
                <i class="bi bi-instagram"></i>
              </a>

              <a
                href="https://www.youtube.com/@haakadarchitects"
                target="_blank"
              >
                <i class="bi bi-youtube"></i>
              </a>
            </div>
          </div>

          <!-- Content -->
          <div class="row align-items-start">
            <!-- Left -->
            <div class="col-md-5 mb-5 text-center">
              <h2 class="contact-title">
                Let’s create something meaningful together.
              </h2>
            </div>

            <!-- Right -->
            <div class="col-md-7 contact-details">
              <div class="contact-block">
                <span class="label">Project Enquiries</span>
                <a href="mailto:reachus@haakad.com">reachus@haakad.com</a>
              </div>

              <div class="contact-block mt-4">
                <span class="label">Office</span>
                <p>
                  Old No 7, Kamala 2nd St, Chinna Chokkikulam, Madurai, Tamil
                  Nadu<br />Pincode - 625002
                </p>
              </div>

              <div class="contact-block">
                <span class="label">Phone</span>
                <a href="tel:+918667341063">+91-86673 41063</a>
              </div>

              <a
                href="https://maps.app.goo.gl/Pyx2EJdF9qvEjLzA7"
                class="map-link"
                >VIEW ON GOOGLE MAP</a
              >
            </div>
          </div>
        </div>
      </section>
    </main>

    <div id="footer"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/main.js"></script>
    <script src="assets/js/parallax.js"></script>
  </body>
</html>

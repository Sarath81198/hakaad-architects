<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Work - Haakad Architects</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@400;500;600;700&family=Prompt:wght@300;400;500&display=swap"
      rel="stylesheet"
    />

    <!-- Bootstrap -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <!-- Icons -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css"
    />

    <!-- CSS -->
    <link rel="stylesheet" href="assets/css/style.css" />
    <link rel="stylesheet" href="assets/css/navbar.css" />
    <link rel="stylesheet" href="assets/css/footer.css" />
    <link rel="stylesheet" href="assets/css/work.css" />
    <link rel="stylesheet" href="assets/css/responsive.css" />
    <link rel="stylesheet" href="assets/css/parallax.css" />
  </head>

  <body class="nav-white">
    <!-- Navbar -->
    <header id="navbar"></header>

    <main>
      <!-- Filters -->
      <section class="work-filter">
        <div class="container">
          <div class="filter-tabs">
            <button class="filter-btn active" data-filter="architecture">
              Architecture
            </button>
            <button class="filter-btn" data-filter="interior">Interior</button>
            <button class="filter-btn" data-filter="commercial">
              Commercial
            </button>
            <button class="filter-btn" data-filter="completed">
              Completed
            </button>
          </div>
        </div>
      </section>

      <!-- Projects -->
      <section class="work-grid">
        <div class="container">
          <div class="row g-4" id="projects-grid"></div>
        </div>
      </section>
    </main>

    <!-- Footer -->
    <div id="footer"></div>

    <!-- JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <!-- IMPORTANT ORDER -->
    <script src="assets/js/projects.js"></script>
    <script src="assets/js/work.js"></script>
    <script src="assets/js/parallax.js"></script>
  </body>
</html>
